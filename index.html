
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>हिंदावी साठी खास भेट 🎁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap');

        body {
            background-color: #fff0f3;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }

        /* Preloader Styles */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #ffffff; display: flex; align-items: center;
            justify-content: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #preloader-video { width: 100%; height: 100%; object-fit: cover; }
        .preloader-hidden { opacity: 0; visibility: hidden; }

        .cursive { font-family: 'Dancing Script', cursive; }

        .heart-emoji {
            position: absolute; font-size: 2.5rem;
            animation: floatUp 1.5s ease-out forwards;
            pointer-events: none; z-index: 20000;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-300px) scale(1.5) rotate(45deg); opacity: 0; }
        }

        .container-card {
            background: white; padding: 2.5rem; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.4);
            text-align: center; max-width: 450px; width: 90%;
            z-index: 10; transition: all 0.5s ease; display: none;
        }

        #noBtn { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); white-space: nowrap; }

        .gift-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 200; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            animation: fadeIn 1s ease-in;
        }

        /* Overlay Stages */
        #video-wrapper, #surprise-stage, #rss-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 300; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #video-wrapper video, #surprise-stage video, #rss-container video { width: 100%; max-height: 100%; }

        .close-btn-style {
            position: absolute; top: 20px; right: 20px; font-size: 35px;
            color: white; background: rgba(0,0,0,0.4); border: none;
            cursor: pointer; width: 50px; height: 50px; border-radius: 50%;
            z-index: 310; display: flex; align-items: center; justify-content: center;
        }

        /* Buttons Styling */
        .action-btn {
            color: white; padding: 15px 35px;
            border-radius: 50px; font-weight: bold; font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: none; cursor: pointer; transition: transform 0.2s;
        }
        #start-magic, #show-surprise-btn { background: #ff4d6d; }
        #play-rss-btn { background: #8e44ad; }
        #final-love-btn { background: #c0392b; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(192, 57, 43, 0); }
            100% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0); }
        }

        .btn-wrapper {
            display: flex; flex-direction: column; align-items: center;
            gap: 20px; margin-top: 30px; min-height: 200px;
        }

        .shake { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10px { transform: translate(-1px, -2px) rotate(-1deg); }
            20px { transform: translate(-3px, 0px) rotate(1deg); }
            30px { transform: translate(3px, 2px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <!-- Video Preloader -->
    <div id="preloader">
        <video autoplay muted playsinline id="preloader-video">
            <source src="Untitled.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Main Card -->
    <div class="container-card" id="questionCard">
        <div class="mb-6"><span class="text-7xl">🎁</span></div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2 cursive">Special Gift For You Hindavi...</h1>
        <p class="text-xl text-pink-600 font-semibold mb-6">बघायचं आहे का? ✨</p>
        <div class="btn-wrapper">
            <button id="yesBtn" onclick="handleYesClick()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 px-14 rounded-full shadow-lg transform transition active:scale-90 text-xl z-20">हो! 😍</button>
            <button id="noBtn" class="bg-gray-200 text-gray-700 font-bold py-2 px-8 rounded-full shadow-md text-lg">नाही 💔</button>
        </div>
    </div>

    <!-- Gift Screen -->
    <div id="giftScreen" class="gift-overlay">
        <div class="mb-4 text-8xl animate-bounce">💝</div>
        <h2 class="text-5xl font-bold text-pink-600 cursive mb-4">Surprise! हिंदावी</h2>
        <p class="text-2xl text-gray-700 mb-8 px-8">तू माझ्यासाठी सर्वात मोठं 'Gift' आहेस! 💍✨</p>
        
        <div id="magic-btn-area">
            <button id="start-magic" class="action-btn">Start Magic ❤️</button>
        </div>
        <div id="surprise-btn-area" style="display: none;">
            <button id="show-surprise-btn" class="action-btn">Click for Surprise ❤️</button>
        </div>
        <div id="rss-btn-area" style="display: none;">
            <button id="play-rss-btn" class="action-btn">Watch Final Surprise 🎬</button>
        </div>
        <div id="final-love-area" style="display: none;">
            <button id="final-love-btn" class="action-btn">The Last Message ❤️</button>
        </div>

        <div class="text-7xl mt-10">👸❤️🤴</div>
        <button onclick="location.reload()" class="mt-10 text-gray-400 text-sm underline">परत जा</button>
    </div>

    <!-- Stage 1 (Love.MP4) -->
    <div id="video-wrapper">
        <video id="love-video" playsinline><source src="Love.MP4" type="video/mp4"></video>
        <button class="close-btn-style" onclick="closeLoveVideo()">×</button>
    </div>

    <!-- Stage 2 (Suprise.MP4 & Photo) -->
    <div id="surprise-stage">
        <video id="surprise-video" playsinline><source src="Suprise.MP4" type="video/mp4"></video>
        <img src="My.PNG" id="final-photo" style="display: none; width: 100%; height: 100%; object-fit: cover;">
        <button id="close-btn" class="close-btn-style">×</button>
    </div>

    <!-- Stage 3 (Rss.MP4) -->
    <div id="rss-container">
        <video id="rss-video" playsinline><source src="Rss.MP4" type="video/mp4"></video>
        <button id="rss-close" class="close-btn-style">×</button>
    </div>

    <!-- NEW Stage 4: Final Love Stage -->
    <div id="final-love-stage" style="display:none; position:fixed; top:0; left:0; width:100%; height:100vh; background:#000; z-index:10000;">
        <video id="love-player" style="width:100%; height:100%; object-fit:cover;" playsinline>
            <source id="love-source" src="Final.MP4" type="video/mp4">
        </video>
        <button id="close-love" style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:40px; cursor:pointer;">×</button>
    </div>

    <div id="emojiContainer"></div>

    <script>
        // Preloader
        window.onload = () => {
            const video = document.getElementById('preloader-video');
            video.onended = hidePreloader;
            setTimeout(() => { if(document.getElementById('preloader').style.display !== 'none') hidePreloader(); }, 8000);
        };
        function hidePreloader() {
            document.getElementById('preloader').classList.add('preloader-hidden');
            document.getElementById('questionCard').style.display = 'block';
            setTimeout(() => document.getElementById('preloader').style.display = 'none', 800);
        }

        // Logic
        let tapCount = 0;
        let noScale = 1;
        const noBtn = document.getElementById('noBtn');
        const questionCard = document.getElementById('questionCard');
        const giftScreen = document.getElementById('giftScreen');

        function createEmoji(type) {
            const emoji = document.createElement('div');
            emoji.className = 'heart-emoji';
            emoji.innerText = type;
            emoji.style.left = Math.random() * 80 + 10 + 'vw';
            emoji.style.top = '60vh';
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 1500);
        }

        function handleYesClick() {
            tapCount++;
            noScale += 0.8;
            noBtn.style.transform = `scale(${noScale})`;
            noBtn.innerText = ["कसा वाटला झटका?", "नाही कसं म्हणणार?", "अजून मोठं होणार!", "हृदय तुटलं! 💔"][tapCount % 4];
            for(let i=0; i<3; i++) setTimeout(() => createEmoji('💔'), i * 100);
            questionCard.classList.add('shake');
            setTimeout(() => questionCard.classList.remove('shake'), 500);
            if (tapCount >= 7) {
                questionCard.style.display = 'none';
                giftScreen.style.display = 'flex';
                setInterval(() => createEmoji(['❤️', '💖', '✨'][Math.floor(Math.random()*3)]), 300);
            }
        }

        // --- SEQUENCING ---
        const startMagic = document.getElementById('start-magic');
        const loveVideo = document.getElementById('love-video');
        const videoWrapper = document.getElementById('video-wrapper');
        
        const showSurpriseBtn = document.getElementById('show-surprise-btn');
        const surpriseStage = document.getElementById('surprise-stage');
        const surpriseVideo = document.getElementById('surprise-video');
        const finalPhoto = document.getElementById('final-photo');
        const closeBtnFinal = document.getElementById('close-btn');

        const playRssBtn = document.getElementById('play-rss-btn');
        const rssContainer = document.getElementById('rss-container');
        const rssVideo = document.getElementById('rss-video');
        const rssClose = document.getElementById('rss-close');

        const finalLoveBtn = document.getElementById('final-love-btn');
        const finalLoveStage = document.getElementById('final-love-stage');
        const lovePlayer = document.getElementById('love-player');
        const closeLove = document.getElementById('close-love');

        // Stage 1
        startMagic.onclick = () => { videoWrapper.style.display = 'flex'; loveVideo.play(); };
        loveVideo.onended = closeLoveVideo;
        function closeLoveVideo() {
            videoWrapper.style.display = 'none';
            loveVideo.pause();
            document.getElementById('magic-btn-area').style.display = 'none';
            document.getElementById('surprise-btn-area').style.display = 'block';
        }

        // Stage 2
        showSurpriseBtn.onclick = () => {
            surpriseStage.style.display = 'flex';
            surpriseVideo.style.display = 'block';
            finalPhoto.style.display = 'none';
            surpriseVideo.play();
        };
        surpriseVideo.onended = () => {
            surpriseVideo.style.display = 'none';
            finalPhoto.style.display = 'block';
        };
        closeBtnFinal.onclick = () => {
            surpriseStage.style.display = 'none';
            surpriseVideo.pause();
            document.getElementById('surprise-btn-area').style.display = 'none';
            document.getElementById('rss-btn-area').style.display = 'block';
        };

        // Stage 3
        playRssBtn.onclick = () => { rssContainer.style.display = 'flex'; rssVideo.play(); };
        rssVideo.onended = () => { for(let i=0; i<10; i++) setTimeout(() => createEmoji('✨'), i*100); };
        rssClose.onclick = () => {
            rssContainer.style.display = 'none';
            rssVideo.pause();
            document.getElementById('rss-btn-area').style.display = 'none';
            document.getElementById('final-love-area').style.display = 'block';
        };

        // Stage 4: Final Love Stage
        finalLoveBtn.onclick = () => {
            finalLoveStage.style.display = 'block';
            lovePlayer.play();
        };
        lovePlayer.onended = () => {
            for(let i=0; i<30; i++) setTimeout(() => createEmoji('❤️'), i*50);
        };
        closeLove.onclick = () => {
            finalLoveStage.style.display = 'none';
            lovePlayer.pause();
            lovePlayer.currentTime = 0;
        };
    </script>
</body>
</html>
