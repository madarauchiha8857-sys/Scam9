
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SK Cafe - Premium Integrated Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .bg-transition {
            transition: background-color 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideInUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .animate-text {
            animation: slideInUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .svg-container {
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .svg-hidden {
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            filter: blur(8px);
        }

        .size-btn {
            transition: all 0.3s ease;
        }
        .size-btn.active {
            background-color: #4A3728;
            color: white;
            transform: scale(1.15);
            box-shadow: 0 4px 15px rgba(74, 55, 40, 0.3);
        }

        @keyframes successPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .animate-success {
            animation: successPop 0.5s ease-out;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            pointer-events: none;
            border-radius: 50%;
            z-index: 100;
        }

        /* AI Chat Window */
        #ai-chat-window {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(20px) scale(0.9);
            opacity: 0;
            pointer-events: none;
        }
        #ai-chat-window.open {
            transform: translateY(0) scale(1);
            opacity: 1;
            pointer-events: auto;
        }
        .chat-msg {
            max-width: 85%;
            margin-bottom: 10px;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .bot-msg { background: #F3F0EC; color: #4A3728; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #E5E0D8; }
        .user-msg { background: #4A3728; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    </style>
</head>
<body id="body-bg" class="bg-[#F2E3CA] bg-transition">

    <div class="min-h-screen flex flex-col items-center py-6 md:py-12 px-4 relative">
        
        <!-- Background Decorative Floor -->
        <div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-white to-transparent pointer-events-none opacity-90 z-0" 
             style="clip-path: polygon(0 60%, 100% 20%, 100% 100%, 0 100%);">
        </div>

        <!-- Header -->
        <div id="header-container" class="z-10 text-center mb-8">
            <h1 class="text-6xl md:text-9xl font-black tracking-tighter leading-none mb-0 select-none drop-shadow-sm">
                NEW<br><span id="coffee-name" class="inline-block animate-text">ESPRESSO</span>
            </h1>
        </div>

        <!-- Main Interaction Area -->
        <div class="relative z-10 w-full max-w-xl flex flex-col items-center">
            
            <!-- Side Controls (Left/Right) -->
            <button onclick="changeCoffee(-1)" class="absolute left-2 md:left-[-60px] top-1/2 -translate-y-1/2 p-3 md:p-6 hover:scale-125 transition-transform z-30 opacity-40 hover:opacity-100 bg-white/20 rounded-full backdrop-blur-sm">
                <i data-lucide="chevron-left" class="w-8 h-8 md:w-14 md:h-14 stroke-[1.5px]"></i>
            </button>
            <button onclick="changeCoffee(1)" class="absolute right-2 md:right-[-60px] top-1/2 -translate-y-1/2 p-3 md:p-6 hover:scale-125 transition-transform z-30 opacity-40 hover:opacity-100 bg-white/20 rounded-full backdrop-blur-sm">
                <i data-lucide="chevron-right" class="w-8 h-8 md:w-14 md:h-14 stroke-[1.5px]"></i>
            </button>

            <!-- Product Visualizer -->
            <div id="svg-container" class="w-72 h-72 md:w-[450px] md:h-[450px] relative flex items-center justify-center svg-container">
                <svg viewBox="0 0 200 200" class="w-full h-full">
                    <defs>
                        <radialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                            <stop offset="0%" style="stop-color:#FFFDF7;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#F5EEDC;stop-opacity:1" />
                        </radialGradient>
                        
                        <!-- Coffee Bean Gradient -->
                        <linearGradient id="beanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#8D6E63;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" />
                        </linearGradient>

                        <filter id="shadow-blur" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
                            <feOffset dx="0" dy="4" result="offsetblur" />
                            <feComponentTransfer>
                                <feFuncA type="linear" slope="0.3" />
                            </feComponentTransfer>
                            <feMerge>
                                <feMergeNode />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>

                    <!-- Background Base Circle with Depth -->
                    <circle cx="100" cy="100" r="88" fill="url(#grad1)" stroke="#4A3728" stroke-width="0.5" opacity="0.6" />
                    
                    <!-- Grounding Shadow -->
                    <ellipse cx="100" cy="138" rx="45" ry="10" fill="#4A3728" opacity="0.1" filter="url(#shadow-blur)" />
                    
                    <!-- Realistic Coffee Beans -->
                    <g class="animate-bounce" style="animation-duration: 4s;">
                        <!-- Left Bean -->
                        <g transform="translate(65, 45) rotate(-25)">
                           <!-- Bean Body -->
                           <path d="M 5 15 Q -5 25 5 35 Q 15 45 25 35 Q 35 25 25 15 Q 15 5 5 15 Z" fill="url(#beanGrad)" filter="drop-shadow(2px 2px 2px rgba(0,0,0,0.3))" />
                           <!-- Center Crease -->
                           <path d="M 12 10 Q 18 25 12 40" stroke="#2D1B10" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round" />
                           <!-- Highlight -->
                           <ellipse cx="8" cy="18" rx="3" ry="6" fill="white" opacity="0.1" transform="rotate(-15, 8, 18)" />
                        </g>
                        
                        <!-- Right Bean -->
                        <g transform="translate(125, 40) rotate(20) scale(0.9)">
                           <!-- Bean Body -->
                           <path d="M 5 15 Q -5 25 5 35 Q 15 45 25 35 Q 35 25 25 15 Q 15 5 5 15 Z" fill="#5D4037" filter="drop-shadow(2px 2px 2px rgba(0,0,0,0.3))" />
                           <!-- Center Crease -->
                           <path d="M 12 10 Q 8 25 12 40" stroke="#2D1B10" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round" />
                           <!-- Highlight -->
                           <ellipse cx="22" cy="18" rx="2" ry="5" fill="white" opacity="0.1" />
                        </g>
                    </g>

                    <!-- Coffee Cup Model -->
                    <g transform="translate(55, 80)" filter="drop-shadow(0 15px 15px rgba(0,0,0,0.1))">
                       <!-- Saucer -->
                       <ellipse cx="45" cy="56" rx="48" ry="14" fill="#D2B48C" stroke="#4A3728" stroke-width="0.5" />
                       <ellipse cx="45" cy="54" rx="42" ry="10" fill="#E8D5B7" stroke="#4A3728" stroke-width="0.2" />
                       
                       <!-- Cup Body -->
                       <path id="cup-body" d="M 12 10 Q 12 52 45 52 Q 78 52 78 10 Z" fill="#FFFFFF" stroke="#4A3728" stroke-width="2.5" />
                       
                       <!-- Internal Shadow -->
                       <path d="M 15 12 Q 15 48 45 48 Q 75 48 75 12" fill="none" stroke="black" stroke-width="4" opacity="0.03" />

                       <!-- Liquid surface -->
                       <ellipse id="liquid-color" cx="45" cy="10" rx="31" ry="8" fill="#4A3728" />
                       
                       <!-- Steam Effects -->
                       <g class="animate-pulse" style="animation-duration: 2s;">
                           <path d="M 35 -5 Q 40 -20 35 -35" stroke="#4A3728" fill="none" opacity="0.2" stroke-width="1" />
                           <path d="M 55 -5 Q 60 -20 55 -35" stroke="#4A3728" fill="none" opacity="0.2" stroke-width="1" />
                       </g>
                    </g>

                    <!-- Bottom Accent Lines -->
                    <path d="M 25 145 Q 60 135 95 145 M 105 145 Q 140 135 175 145" stroke="#4A3728" fill="none" stroke-width="1.5" opacity="0.5" />
                </svg>
            </div>

            <!-- Brand Messaging -->
            <div id="branding-container" class="text-center mt-6 transition-all duration-500">
                <h2 class="text-5xl md:text-7xl font-serif tracking-widest text-[#4A3728] font-bold">SK CAFE</h2>
                <p id="tagline" class="text-sm md:text-lg tracking-[0.4em] text-[#4A3728] mt-2 font-bold uppercase opacity-80">Brewed Awakenings</p>
                
                <!-- Improved Size Selectors -->
                <div class="mt-8 flex justify-center gap-6 items-center">
                    <button onclick="setSize('S')" class="size-btn w-12 h-12 rounded-full border-2 border-[#4A3728] flex items-center justify-center font-black text-sm active" id="btn-S">S</button>
                    <button onclick="setSize('M')" class="size-btn w-12 h-12 rounded-full border-2 border-[#4A3728] flex items-center justify-center font-black text-sm" id="btn-M">M</button>
                    <button onclick="setSize('L')" class="size-btn w-12 h-12 rounded-full border-2 border-[#4A3728] flex items-center justify-center font-black text-sm" id="btn-L">L</button>
                </div>
            </div>
        </div>

        <!-- Order Button Container -->
        <div class="z-20 mt-12 mb-24 w-full max-w-xs flex justify-center">
            <button id="order-btn" onclick="placeOrder()" 
                class="w-full py-5 rounded-full border-2 border-[#4A3728] text-xl font-black tracking-widest transition-all duration-500 shadow-2xl bg-white text-[#4A3728] active:scale-95 group relative overflow-hidden">
                <span id="order-text" class="relative z-10">ORDER NOW</span>
                <div id="btn-bg" class="absolute inset-0 bg-[#4A3728] translate-y-full transition-transform duration-300 group-hover:translate-y-0"></div>
            </button>
        </div>

        <!-- AI Assistant Hub -->
        <div class="fixed bottom-6 right-6 z-50">
            <div id="ai-chat-window" class="absolute bottom-20 right-0 w-[300px] h-[450px] bg-white rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.15)] flex flex-col overflow-hidden border border-gray-100">
                <div class="bg-[#4A3728] p-4 text-white font-bold flex justify-between items-center shadow-md">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                            <i data-lucide="coffee" class="w-5 h-5"></i>
                        </div>
                        <span class="tracking-wide">Caffie Assistant</span>
                    </div>
                    <button onclick="toggleChat()" class="p-1 hover:bg-white/10 rounded-lg transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <div id="chat-messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-2 bg-[#FBF9F6]">
                    <div class="chat-msg bot-msg">Hey! I'm Caffie. ☕<br><br>Tell me how you're feeling and I'll find your perfect cup!</div>
                </div>
                <div class="p-4 border-t bg-white flex gap-2">
                    <input type="text" id="chat-input" placeholder="What's your mood?" class="flex-1 border-2 border-gray-100 rounded-2xl px-4 py-2 text-sm focus:outline-none focus:border-[#4A3728] transition-colors">
                    <button onclick="sendMessage()" class="bg-[#4A3728] text-white p-3 rounded-2xl shadow-lg hover:scale-105 active:scale-95 transition-transform">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            
            <button onclick="toggleChat()" class="bg-[#4A3728] text-white p-4 md:p-5 rounded-full shadow-[0_10px_30px_rgba(74,55,40,0.4)] hover:scale-110 transition-all flex items-center justify-center group">
                <div class="flex items-center gap-3">
                    <svg class="w-8 h-8 fill-white" viewBox="0 0 24 24">
                        <path d="M2,21H20V19H2M20,8H18V5H2V17H18V14H20A2,2 0 0,0 22,12V10A2,2 0 0,0 20,8M16,15H4V7H16M20,12H18V10H20" />
                        <path d="M6,2H8V4H6V2M10,2H12V4H10V2M14,2H16V4H14V2Z" opacity="0.6" />
                    </svg>
                    <span class="hidden md:inline font-black tracking-widest text-sm uppercase">Caffie AI</span>
                </div>
            </button>
        </div>

        <div class="absolute bottom-[-100px] w-[160%] h-60 bg-black rounded-[100%] blur-[100px] opacity-5 pointer-events-none"></div>
    </div>

    <script>
        const coffeeTypes = [
            { name: "ESPRESSO", tagline: "Intensity Reimagined", cup: "#FFFFFF", liquid: "#2D1B10", bg: "#F2E3CA", keys: ["strong", "tired", "sleepy", "energy", "wake", "hard", "bold", "dark"] },
            { name: "LATTE", tagline: "Velvet Smoothness", cup: "#FBF5EF", liquid: "#D7B19D", bg: "#EAD7BB", keys: ["smooth", "creamy", "light", "milky", "soft", "calm", "gentle"] },
            { name: "CAPPUCCINO", tagline: "Airy & Balanced", cup: "#FFFFFF", liquid: "#8D6E63", bg: "#D9C5B2", keys: ["foam", "cloud", "frothy", "morning", "balanced", "airy"] },
            { name: "MOCHA", tagline: "Gourmet Indulgence", cup: "#F5E9DD", liquid: "#3B2F2F", bg: "#CCBBAA", keys: ["chocolate", "sweet", "choco", "treat", "sugar", "dessert", "rich"] }
        ];

        let currentIndex = 0;
        let selectedSize = 'S';

        lucide.createIcons();

        function setSize(size) {
            selectedSize = size;
            ['S', 'M', 'L'].forEach(s => {
                const btn = document.getElementById(`btn-${s}`);
                if (s === size) {
                    btn.classList.add('active', 'border-[#4A3728]');
                    btn.classList.remove('text-[#4A3728]');
                } else {
                    btn.classList.remove('active');
                    btn.classList.add('text-[#4A3728]');
                }
            });
            const svg = document.getElementById('svg-container');
            const scales = { 'S': '0.9', 'M': '1', 'L': '1.15' };
            svg.style.transform = `scale(${scales[size]})`;
            document.getElementById('order-text').innerText = `ORDER ${coffeeTypes[currentIndex].name}`;
        }

        function updateUI() {
            const coffee = coffeeTypes[currentIndex];
            const svg = document.getElementById('svg-container');
            const headerText = document.getElementById('coffee-name');

            svg.classList.add('svg-hidden');
            headerText.classList.remove('animate-text');
            headerText.style.opacity = '0';

            setTimeout(() => {
                document.getElementById('body-bg').style.backgroundColor = coffee.bg;
                headerText.innerText = coffee.name;
                document.getElementById('tagline').innerText = coffee.tagline;
                document.getElementById('cup-body').setAttribute('fill', coffee.cup);
                document.getElementById('liquid-color').setAttribute('fill', coffee.liquid);
                document.getElementById('order-text').innerText = `ORDER ${coffee.name}`;

                svg.classList.remove('svg-hidden');
                void headerText.offsetWidth; 
                headerText.classList.add('animate-text');
                headerText.style.opacity = '1';
            }, 450);
        }

        function changeCoffee(dir) {
            currentIndex = (currentIndex + dir + coffeeTypes.length) % coffeeTypes.length;
            updateUI();
        }

        function toggleChat() {
            document.getElementById('ai-chat-window').classList.toggle('open');
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim().toLowerCase();
            if (!msg) return;

            addMessage(input.value, 'user');
            input.value = '';

            setTimeout(() => {
                let found = false;
                for (let i = 0; i < coffeeTypes.length; i++) {
                    if (coffeeTypes[i].keys.some(k => msg.includes(k))) {
                        currentIndex = i;
                        updateUI();
                        addMessage(`Masterpiece! Based on your vibe, I've selected the ${coffeeTypes[i].name}. It matches your craving perfectly.`, 'bot');
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    addMessage("Hmm, that's interesting. Tell me, do you prefer something 'Strong', 'Creamy', or maybe 'Chocolatey'?", 'bot');
                }
            }, 800);
        }

        function addMessage(text, side) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `chat-msg ${side}-msg`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function placeOrder() {
            const btn = document.getElementById('order-btn');
            const text = document.getElementById('order-text');
            const rect = btn.getBoundingClientRect();
            const scrollY = window.pageYOffset || document.documentElement.scrollTop;

            btn.classList.add('animate-success');
            text.innerText = "ORDER PLACED!";
            text.classList.add('text-white');
            btn.classList.add('bg-green-600', 'border-green-600');

            for(let i=0; i<30; i++) createConfetti(rect.left + rect.width/2, rect.top + scrollY + rect.height/2);

            setTimeout(() => {
                btn.classList.remove('animate-success', 'bg-green-600', 'border-green-600');
                text.innerText = `ORDER ${coffeeTypes[currentIndex].name}`;
                text.classList.remove('text-white');
            }, 3000);
        }

        function createConfetti(x, y) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = x + 'px';
            conf.style.top = y + 'px';
            conf.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
            document.body.appendChild(conf);
            const angle = Math.random() * Math.PI * 2;
            const velocity = 5 + Math.random() * 10;
            let px = x, py = y, op = 1;
            const anim = setInterval(() => {
                px += Math.cos(angle) * velocity;
                py += Math.sin(angle) * velocity + 2;
                op -= 0.025;
                conf.style.transform = `translate(${px-x}px, ${py-y}px)`;
                conf.style.opacity = op;
                if(op <= 0) { clearInterval(anim); conf.remove(); }
            }, 16);
        }

        window.onload = () => { setSize('S'); updateUI(); };
    </script>
</body>
</html>
