
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>हिंदावी साठी खास भेट 🎁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap');

        body {
            background-color: #000;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }

        .cursive { font-family: 'Dancing Script', cursive; }

        /* Heart Beat Animation for Master Stage */
        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }

        /* Preloader */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        #opening-video { width: 100%; height: 100%; object-fit: cover; }

        /* Journey Page */
        #journey-page {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: #111; color: white; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9998;
            text-align: center;
        }

        /* Heart Emoji Animation */
        .heart-emoji {
            position: absolute; font-size: 2.5rem;
            animation: floatUp 1.5s ease-out forwards;
            pointer-events: none; z-index: 20000;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-300px) scale(1.5) rotate(45deg); opacity: 0; }
        }

        /* Main Card */
        .container-card {
            background: white; padding: 2.5rem; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.4);
            text-align: center; max-width: 450px; width: 90%;
            z-index: 10; transition: all 0.5s ease; display: none;
            position: relative;
        }

        #noBtn { 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            white-space: nowrap; z-index: 40;
        }

        .gift-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 200; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        /* Stages */
        .stage-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: black; z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .stage-container video { width: 100%; height: 100%; object-fit: cover; }

        .close-btn-style {
            position: absolute; top: 20px; right: 20px; font-size: 35px;
            color: white; background: rgba(0,0,0,0.5); border: none;
            cursor: pointer; width: 50px; height: 50px; border-radius: 50%;
            z-index: 11000; display: flex; align-items: center; justify-content: center;
        }

        .action-btn {
            background: #ff4d6d; color: white; padding: 15px 35px;
            border-radius: 50px; font-weight: bold; font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.4);
            border: none; cursor: pointer; transition: transform 0.2;
        }

        .shake { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10px { transform: translate(-1px, -2px) rotate(-1deg); }
            20px { transform: translate(-3px, 0px) rotate(1deg); }
            30px { transform: translate(3px, 2px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <!-- 1. Video Preloader (Untitled.mp4) -->
    <div id="preloader">
        <video id="opening-video" autoplay muted playsinline>
            <source src="Untitled.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 2. Journey Page -->
    <div id="journey-page">
        <h1 class="text-4xl cursive mb-8">The Journey Begins...</h1>
        <button id="start-journey-btn">Start Journey ✨</button>
    </div>

    <!-- Background Music (Aajdin.mp3) -->
    <audio id="bg-music" src="Aajdin.mp3" loop></audio>

    <!-- 3. Question Card (Yes/No Prank) -->
    <div class="container-card" id="questionCard">
        <div class="mb-6"><span class="text-7xl">🎁</span></div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2 cursive">Special Gift For You Hindavi...</h1>
        <p class="text-xl text-pink-600 font-semibold mb-6">बघायचं आहे का? ✨</p>
        <div class="flex flex-col items-center gap-20 min-h-[300px] relative">
            <button id="yesBtn" onclick="handleYesClick()" onmouseenter="interfereNo()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 px-14 rounded-full shadow-lg text-xl z-50">
                हो! 😍
            </button>
            <button id="noBtn" class="bg-gray-200 text-gray-700 font-bold py-2 px-8 rounded-full shadow-md text-lg">
                नाही 💔
            </button>
        </div>
    </div>

    <!-- 4. Gift Success Screen -->
    <div id="giftScreen" class="gift-overlay">
        <div class="mb-4 text-8xl animate-bounce">💝</div>
        <h2 class="text-5xl font-bold text-pink-600 cursive mb-4">Surprise! हिंदावी</h2>
        <p class="text-2xl text-gray-700 mb-8 px-8">तू माझ्यासाठी सर्वात मोठं 'Gift' आहेस! 💍✨</p>
        
        <div class="flex flex-col gap-4">
            <div id="magic-btn-area">
                <button id="start-magic" class="action-btn">Start Magic ❤️</button>
            </div>
            <div id="surprise-btn-area" style="display: none;">
                <button id="show-surprise-btn" class="action-btn">Click for Surprise ❤️</button>
            </div>
            <div id="rss-btn-area" style="display: none;">
                <button id="play-rss-btn" class="action-btn" style="background: #8e44ad;">Watch Final Surprise 🎬</button>
            </div>
            <div id="final-love-area" style="display: none;">
                <button id="final-love-btn" class="action-btn" style="background: #c0392b;">The Last Message ❤️</button>
            </div>
            <div id="forever-love-area" style="display: none;">
                <button id="forever-love-btn" class="action-btn" style="background: #ff1493;">Our Love Forever ❤️</button>
            </div>
            <div id="final-stuck-area" style="display: none;">
                <button id="final-stuck-btn" class="action-btn" style="background: #e91e63;">Our Story ❤️</button>
            </div>
        </div>
        <div class="text-7xl mt-10">👸❤️🤴</div>
    </div>

    <!-- Stage Layers -->
    <!-- Love Stage -->
    <div id="love-stage" class="stage-container">
        <video id="love-player-1" playsinline><source src="Love.MP4" type="video/mp4"></video>
        <button class="close-btn-style" id="love-close">×</button>
    </div>

    <!-- NEW Master Stage (Integrated based on your snippet) -->
    <div id="master-stage" style="display:none; position:fixed; top:0; left:0; width:100%; height:100vh; background:#000; z-index:10000; justify-content:center; align-items:center; flex-direction:column;">
        
        <!-- Video Player -->
        <video id="master-player" style="width:100%; height:100%; object-fit:cover;" playsinline>
            <source src="Suprise.MP4" type="video/mp4">
        </video>
        
        <!-- Photo Frame -->
        <div id="photo-frame" style="display:none; width:100%; height:100%;">
            <img src="My.PNG" style="width:100%; height:100%; object-fit:cover;">
        </div>

        <!-- Final Text Frame -->
        <div id="final-text-frame" style="display:none; text-align:center; padding:20px; position:absolute;">
            <h1 style="color:#ff4d6d; font-size:2.5rem; text-shadow:0 0 20px #ff4d6d; animation: heartBeat 1.5s infinite; font-weight: bold;">
                Love youuu sooo much Hindavi ❤️
            </h1>
        </div>

        <!-- Next Button -->
        <button id="next-step-btn" style="display:none; position:absolute; bottom:50px; right:30px; padding:10px 25px; background:rgba(255, 255, 255, 0.2); color:white; border:1px solid white; border-radius:30px; cursor:pointer; z-index:10002; font-weight:bold;">
            Next →
        </button>

        <!-- Close Button (Added for safety) -->
        <button id="master-close" class="close-btn-style">×</button>
    </div>

    <!-- RSS Stage -->
    <div id="rss-container" class="stage-container">
        <video id="rss-video" playsinline><source src="Rss.MP4" type="video/mp4"></video>
        <button id="rss-close" class="close-btn-style">×</button>
    </div>

    <!-- Final Love Stage -->
    <div id="final-love-stage" class="stage-container">
        <video id="final-love-player" playsinline><source src="Final.MP4" type="video/mp4"></video>
        <button id="close-love" class="close-btn-style">×</button>
    </div>

    <!-- Final Wrap -->
    <div id="final-love-wrap" class="stage-container">
        <video id="my-final-player" playsinline><source src="Mylove.mp4" type="video/mp4"></video>
        <button id="close-final" class="close-btn-style">×</button>
    </div>

    <!-- Stage 6: Final Stuck Stage (Youme.MP4) -->
    <div id="final-stuck-stage" style="display:none; position:fixed; top:0; left:0; width:100%; height:100vh; background:#000; z-index:10015;">
        <video id="final-video" style="width:100%; height:100%; object-fit:cover;" playsinline>
            <source src="Youme.MP4" type="video/mp4">
        </video>
    </div>

    <!-- Stage 7: Final Image Stage (Youme.jpg) -->
    <div id="final-image-stage" style="display:none; position:fixed; top:0; left:0; width:100%; height:100vh; background:#000; z-index:10020; justify-content:center; align-items:center;">
        <img src="Youme.jpg" id="stuck-photo" alt="Us" style="width:100%; height:100%; object-fit:cover;">
    </div>

    <div id="emojiContainer"></div>

    <script>
        // 1. Preloader Logic
        const openingVideo = document.getElementById('opening-video');
        const preloader = document.getElementById('preloader');
        const journeyPage = document.getElementById('journey-page');
        const startJourneyBtn = document.getElementById('start-journey-btn');
        const bgMusic = document.getElementById('bg-music');
        const questionCard = document.getElementById('questionCard');

        openingVideo.onended = () => {
            preloader.style.display = 'none';
            journeyPage.style.display = 'flex';
        };

        startJourneyBtn.onclick = () => {
            journeyPage.style.display = 'none';
            bgMusic.play();
            document.body.style.backgroundColor = "#fff0f3";
            questionCard.style.display = 'block';
        };

        // 2. Prank Logic
        let tapCount = 0;
        let noScale = 1;
        const noBtn = document.getElementById('noBtn');

        function createEmoji(type) {
            const emoji = document.createElement('div');
            emoji.className = 'heart-emoji';
            emoji.innerText = type;
            emoji.style.left = Math.random() * 80 + 10 + 'vw';
            emoji.style.top = '60vh';
            document.getElementById('emojiContainer').appendChild(emoji);
            setTimeout(() => emoji.remove(), 1500);
        }

        function interfereNo() {
            if (tapCount < 7) {
                noScale += 0.3;
                const randomX = (Math.random() - 0.5) * 120;
                const randomY = (Math.random() * -120) - 40; 
                noBtn.style.position = 'absolute';
                noBtn.style.transform = `scale(${noScale}) translate(${randomX}px, ${randomY}px)`;
                noBtn.style.left = '50%';
                noBtn.style.marginLeft = `-${(noBtn.offsetWidth * noScale) / 2}px`;
                noBtn.innerText = "Nahi mhan! 😜";
                questionCard.classList.add('shake');
                setTimeout(() => questionCard.classList.remove('shake'), 300);
            }
        }

        function handleYesClick() {
            tapCount++;
            noScale += 0.5;
            noBtn.style.transform = `scale(${noScale}) translateY(-100px)`;
            for(let i=0; i<3; i++) setTimeout(() => createEmoji('💔'), i * 100);
            if (tapCount >= 7) {
                questionCard.style.display = 'none';
                document.getElementById('giftScreen').style.display = 'flex';
                setInterval(() => createEmoji(['❤️', '💖', '✨'][Math.floor(Math.random()*3)]), 300);
            }
        }

        // Sequence Controller
        const hideButtons = () => {
            ['magic-btn-area','surprise-btn-area','rss-btn-area','final-love-area','forever-love-area','final-stuck-area'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.style.display = 'none';
            });
        };

        const setupStage = (btnId, stageId, videoId, closeId, nextAreaId) => {
            const btn = document.getElementById(btnId);
            const stage = document.getElementById(stageId);
            const video = document.getElementById(videoId);
            const close = document.getElementById(closeId);

            btn.onclick = () => { stage.style.display = 'flex'; video.play(); bgMusic.pause(); };
            const closeFn = () => {
                stage.style.display = 'none'; video.pause();
                hideButtons(); document.getElementById(nextAreaId).style.display = 'block';
                bgMusic.play();
            };
            video.onended = closeFn;
            if(close) close.onclick = closeFn;
        };

        // Initialize Stages
        setupStage('start-magic', 'love-stage', 'love-player-1', 'love-close', 'surprise-btn-area');
        
        // --- MASTER STAGE LOGIC (Replacing Surprise Stage) ---
        const masterStage = document.getElementById('master-stage');
        const masterPlayer = document.getElementById('master-player');
        const photoFrame = document.getElementById('photo-frame');
        const finalTextFrame = document.getElementById('final-text-frame');
        const nextStepBtn = document.getElementById('next-step-btn');
        const masterClose = document.getElementById('master-close');
        
        let masterStep = 0;

        document.getElementById('show-surprise-btn').onclick = () => {
            masterStage.style.display = 'flex';
            masterPlayer.style.display = 'block';
            photoFrame.style.display = 'none';
            finalTextFrame.style.display = 'none';
            nextStepBtn.style.display = 'none';
            masterStep = 0;
            masterPlayer.play();
            bgMusic.pause();
        };

        masterPlayer.onended = () => {
            nextStepBtn.style.display = 'block';
            masterStep = 1;
        };

        nextStepBtn.onclick = () => {
            if (masterStep === 1) {
                // Video to Photo
                masterPlayer.style.display = 'none';
                photoFrame.style.display = 'block';
                masterStep = 2;
            } else if (masterStep === 2) {
                // Photo to Text
                photoFrame.style.display = 'none';
                finalTextFrame.style.display = 'block';
                nextStepBtn.innerText = "Close Surprise";
                masterStep = 3;
            } else if (masterStep === 3) {
                // Close Master Stage
                closeMaster();
            }
        };

        masterClose.onclick = closeMaster;

        function closeMaster() {
            masterStage.style.display = 'none';
            masterPlayer.pause();
            nextStepBtn.innerText = "Next →";
            hideButtons(); 
            document.getElementById('rss-btn-area').style.display = 'block';
            bgMusic.play();
        }

        // --- Other Stages ---
        setupStage('play-rss-btn', 'rss-container', 'rss-video', 'rss-close', 'final-love-area');
        setupStage('final-love-btn', 'final-love-stage', 'final-love-player', 'close-love', 'forever-love-area');
        setupStage('forever-love-btn', 'final-love-wrap', 'my-final-player', 'close-final', 'final-stuck-area');

        // Final Stuck Sequence
        const finalVideo = document.getElementById('final-video');
        const finalStuckStage = document.getElementById('final-stuck-stage');
        const finalImageStage = document.getElementById('final-image-stage');

        document.getElementById('final-stuck-btn').onclick = () => {
            finalStuckStage.style.display = 'block';
            finalVideo.play();
            bgMusic.pause();
        };

        finalVideo.onended = () => {
            finalStuckStage.style.display = 'none';
            finalImageStage.style.display = 'flex';
            setInterval(() => createEmoji('❤️'), 500);
        };
    </script>
</body>
</html>
