
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>हिंदावी साठी खास भेट 🎁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap');

        body {
            background-color: #fff0f3;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }

        /* Preloader Styles */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #ffffff; display: flex; align-items: center;
            justify-content: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #preloader-video { width: 100%; height: 100%; object-fit: cover; }
        .preloader-hidden { opacity: 0; visibility: hidden; }

        .cursive { font-family: 'Dancing Script', cursive; }

        .heart-emoji {
            position: absolute; font-size: 2.5rem;
            animation: floatUp 1.5s ease-out forwards;
            pointer-events: none; z-index: 20000;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-300px) scale(1.5) rotate(45deg); opacity: 0; }
        }

        .container-card {
            background: white; padding: 2.5rem; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.4);
            text-align: center; max-width: 450px; width: 90%;
            z-index: 10; transition: all 0.5s ease; display: none;
            position: relative;
        }

        /* No Button Dynamic Styling */
        #noBtn { 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            white-space: nowrap;
            z-index: 40; /* Lower than Yes button to allow clicking through if needed */
        }

        .gift-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 200; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            animation: fadeIn 1s ease-in;
        }

        /* Video/Photo Stages */
        .stage-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .stage-container video { width: 100%; height: 100%; object-fit: cover; }

        .close-btn-style {
            position: absolute; top: 20px; right: 20px; font-size: 35px;
            color: white; background: rgba(0,0,0,0.5); border: none;
            cursor: pointer; width: 50px; height: 50px; border-radius: 50%;
            z-index: 1100; display: flex; align-items: center; justify-content: center;
        }

        .action-btn {
            background: #ff4d6d; color: white; padding: 15px 35px;
            border-radius: 50px; font-weight: bold; font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.4);
            border: none; cursor: pointer; transition: transform 0.2s;
        }

        .btn-wrapper {
            display: flex; flex-direction: column; align-items: center;
            gap: 20px; margin-top: 30px; min-height: 350px;
            position: relative;
        }

        .shake { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10px { transform: translate(-1px, -2px) rotate(-1deg); }
            20px { transform: translate(-3px, 0px) rotate(1deg); }
            30px { transform: translate(3px, 2px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <!-- 1. Video Preloader (Untitled.mp4) -->
    <div id="preloader">
        <video autoplay muted playsinline id="preloader-video">
            <source src="Untitled.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 2. Main Question Card (Yes/No Prank) -->
    <div class="container-card" id="questionCard">
        <div class="mb-6"><span class="text-7xl">🎁</span></div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2 cursive">Special Gift For You Hindavi...</h1>
        <p class="text-xl text-pink-600 font-semibold mb-6">बघायचं आहे का? ✨</p>
        <div class="btn-wrapper" id="targetArea">
            <!-- YES Button: Z-index high thevla aahe -->
            <button id="yesBtn" onclick="handleYesClick()" onmouseenter="interfereNo()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 px-14 rounded-full shadow-lg transform transition active:scale-90 text-xl z-50">
                हो! 😍
            </button>
            
            <!-- NO Button: Growth logic applied -->
            <button id="noBtn" class="bg-gray-200 text-gray-700 font-bold py-2 px-8 rounded-full shadow-md text-lg">
                नाही 💔
            </button>
        </div>
    </div>

    <!-- 3. Gift Screen (Success) -->
    <div id="giftScreen" class="gift-overlay">
        <div class="mb-4 text-8xl animate-bounce">💝</div>
        <h2 class="text-5xl font-bold text-pink-600 cursive mb-4">Surprise! हिंदावी</h2>
        <p class="text-2xl text-gray-700 mb-8 px-8">तू माझ्यासाठी सर्वात मोठं 'Gift' आहेस! 💍✨</p>
        
        <div id="magic-btn-area">
            <button id="start-magic" class="action-btn">Start Magic ❤️</button>
        </div>
        <div id="surprise-btn-area" style="display: none;">
            <button id="show-surprise-btn" class="action-btn">Click for Surprise ❤️</button>
        </div>
        <div id="rss-btn-area" style="display: none;">
            <button id="play-rss-btn" class="action-btn" style="background: #8e44ad;">Watch Final Surprise 🎬</button>
        </div>
        <div id="final-love-area" style="display: none;">
            <button id="final-love-btn" class="action-btn" style="background: #c0392b;">The Last Message ❤️</button>
        </div>
        <div id="forever-love-area" style="display: none;">
            <button id="forever-love-btn" class="action-btn" style="background: #ff1493; animation: pulse 2s infinite;">Our Love Forever ❤️</button>
        </div>

        <div class="text-7xl mt-10">👸❤️🤴</div>
    </div>

    <!-- 4. Stage 1: Love Video (Love.MP4) -->
    <div id="love-stage" style="display:none; position:fixed; top:0; left:0; width:100%; height:100vh; background:#000; z-index:10000;">
        <video id="love-player-1" style="width:100%; height:100%; object-fit:cover;" playsinline>
            <source src="Love.MP4" type="video/mp4">
        </video>
        <button id="love-close" style="position:absolute; top:20px; right:30px; background:none; border:none; color:#fff; font-size:40px; cursor:pointer;">×</button>
    </div>

    <!-- 5. Stage 2: Surprise Video (Suprise.MP4) + Photo (My.PNG) -->
    <div id="surprise-stage" class="stage-container">
        <video id="surprise-video" playsinline><source src="Suprise.MP4" type="video/mp4"></video>
        <img src="My.PNG" id="final-photo" style="display: none; width: 100%; height: 100%; object-fit: cover;">
        <button id="close-btn" class="close-btn-style">×</button>
    </div>

    <!-- 6. Stage 3: RSS Video (Rss.MP4) -->
    <div id="rss-container" class="stage-container">
        <video id="rss-video" playsinline><source src="Rss.MP4" type="video/mp4"></video>
        <button id="rss-close" class="close-btn-style">×</button>
    </div>

    <!-- 7. Stage 4: Final Love Video (Final.MP4) -->
    <div id="final-love-stage" class="stage-container" style="z-index: 10005;">
        <video id="final-love-player" playsinline><source src="Final.MP4" type="video/mp4"></video>
        <button id="close-love" class="close-btn-style">×</button>
    </div>

    <!-- 8. Stage 5: Final Wrap (Mylove.mp4) -->
    <div id="final-love-wrap" style="display:none; position:fixed; top:0; left:0; width:100%; height:100vh; background:#000; z-index:10010; justify-content:center; align-items:center;">
        <video id="my-final-player" style="width:100%; height:100%; object-fit:cover;" playsinline>
            <source src="Mylove.mp4" type="video/mp4">
        </video>
        <button id="close-final" style="position:absolute; top:20px; right:30px; background:none; border:none; color:#fff; font-size:40px; cursor:pointer;">×</button>
    </div>

    <div id="emojiContainer"></div>

    <script>
        // 1. Preloader logic
        window.onload = () => {
            const video = document.getElementById('preloader-video');
            video.onended = hidePreloader;
            setTimeout(() => { if(document.getElementById('preloader').style.display !== 'none') hidePreloader(); }, 8000);
        };
        function hidePreloader() {
            document.getElementById('preloader').classList.add('preloader-hidden');
            document.getElementById('questionCard').style.display = 'block';
            setTimeout(() => document.getElementById('preloader').style.display = 'none', 800);
        }

        // 2. Card Interaction Prank Logic
        let tapCount = 0;
        let noScale = 1;
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionCard = document.getElementById('questionCard');
        const giftScreen = document.getElementById('giftScreen');

        function createEmoji(type) {
            const emoji = document.createElement('div');
            emoji.className = 'heart-emoji';
            emoji.innerText = type;
            emoji.style.left = Math.random() * 80 + 10 + 'vw';
            emoji.style.top = '60vh';
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 1500);
        }

        // Hindavi 'हो' var mouse nel ki 'नाही' halel ani motha hoil
        function interfereNo() {
            if (tapCount < 7) {
                noScale += 0.4; // Slightly slower growth for better usability
                
                // Random position halavne taaki clickable ho button accessible rahil
                const randomX = (Math.random() - 0.5) * 100;
                const randomY = (Math.random() * -100) - 20; 

                noBtn.style.position = 'absolute';
                noBtn.style.transform = `scale(${noScale}) translate(${randomX}px, ${randomY}px)`;
                noBtn.style.left = '50%';
                noBtn.style.marginLeft = `-${(noBtn.offsetWidth * noScale) / 2}px`;
                noBtn.innerText = "Nahi mhan! 😜";
                
                questionCard.classList.add('shake');
                setTimeout(() => questionCard.classList.remove('shake'), 300);
                for(let i=0; i<2; i++) createEmoji('💔');
            }
        }

        function handleYesClick() {
            tapCount++;
            
            // On click, reset No button slightly to make it look like it's reacting
            noScale += 0.6;
            noBtn.style.transform = `scale(${noScale}) translateY(-80px)`;
            noBtn.innerText = ["Try again! 😂", "Me block kelay!", "Hridaya tutla! 💔", "Pahaat raha! 😜"][tapCount % 4];
            
            for(let i=0; i<3; i++) setTimeout(() => createEmoji('💔'), i * 100);
            
            if (tapCount >= 7) {
                questionCard.style.display = 'none';
                giftScreen.style.display = 'flex';
                // Final celebration rain
                setInterval(() => createEmoji(['❤️', '💖', '✨'][Math.floor(Math.random()*3)]), 300);
            }
        }

        // --- Sequence Control ---

        function hideAllButtons() {
            document.getElementById('magic-btn-area').style.display = 'none';
            document.getElementById('surprise-btn-area').style.display = 'none';
            document.getElementById('rss-btn-area').style.display = 'none';
            document.getElementById('final-love-area').style.display = 'none';
            document.getElementById('forever-love-area').style.display = 'none';
        }

        // Stage 1: Love.MP4
        const loveStage = document.getElementById('love-stage');
        const lovePlayer1 = document.getElementById('love-player-1');
        document.getElementById('start-magic').onclick = () => { loveStage.style.display = 'block'; lovePlayer1.play(); };
        const close1 = () => { 
            loveStage.style.display = 'none'; lovePlayer1.pause(); 
            hideAllButtons(); document.getElementById('surprise-btn-area').style.display = 'block'; 
        };
        lovePlayer1.onended = close1;
        document.getElementById('love-close').onclick = close1;

        // Stage 2: Surprise.MP4 + My.PNG
        const surpriseStage = document.getElementById('surprise-stage');
        const surpriseVideo = document.getElementById('surprise-video');
        const finalPhoto = document.getElementById('final-photo');
        document.getElementById('show-surprise-btn').onclick = () => {
            surpriseStage.style.display = 'flex'; surpriseVideo.style.display = 'block';
            finalPhoto.style.display = 'none'; surpriseVideo.play();
        };
        surpriseVideo.onended = () => { surpriseVideo.style.display = 'none'; finalPhoto.style.display = 'block'; };
        document.getElementById('close-btn').onclick = () => {
            surpriseStage.style.display = 'none'; surpriseVideo.pause();
            hideAllButtons(); document.getElementById('rss-btn-area').style.display = 'block';
        };

        // Stage 3: Rss.MP4
        const rssContainer = document.getElementById('rss-container');
        const rssVideo = document.getElementById('rss-video');
        document.getElementById('play-rss-btn').onclick = () => { rssContainer.style.display = 'flex'; rssVideo.play(); };
        document.getElementById('rss-close').onclick = () => {
            rssContainer.style.display = 'none'; rssVideo.pause();
            hideAllButtons(); document.getElementById('final-love-area').style.display = 'block';
        };

        // Stage 4: Final.MP4
        const finalLoveStage = document.getElementById('final-love-stage');
        const finalLovePlayer = document.getElementById('final-love-player');
        document.getElementById('final-love-btn').onclick = () => { finalLoveStage.style.display = 'flex'; finalLovePlayer.play(); };
        document.getElementById('close-love').onclick = () => {
            finalLoveStage.style.display = 'none'; finalLovePlayer.pause();
            hideAllButtons(); document.getElementById('forever-love-area').style.display = 'block';
        };

        // Stage 5: Mylove.mp4
        const finalWrap = document.getElementById('final-love-wrap');
        const myFinalPlayer = document.getElementById('my-final-player');
        document.getElementById('forever-love-btn').onclick = () => { finalWrap.style.display = 'flex'; myFinalPlayer.play(); };
        document.getElementById('close-final').onclick = () => { finalWrap.style.display = 'none'; myFinalPlayer.pause(); };

    </script>
</body>
</html>
